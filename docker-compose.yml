services:
  bi-cli:
    build: .
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.siliconflow.cn/v1}
    volumes:
      - ./references:/app/references:ro
      - ./outputs:/app/outputs
      - ./configs:/app/configs:ro
    profiles: ["cli"]

  bi-web:
    build: .
    command: ["uv", "run", "uvicorn", "petfish_bi_cli.web:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.siliconflow.cn/v1}
    volumes:
      - ./references:/app/references:ro
      - ./outputs:/app/outputs
      - ./configs:/app/configs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles: ["web"]
